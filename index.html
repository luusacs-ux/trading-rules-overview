<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Rules Overview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
.header{position:sticky;top:0;z-index:10;background:#16213e;padding:12px 16px;border-bottom:1px solid #0f3460}
.header h1{font-size:1.3rem;color:#e94560;margin-bottom:4px}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0 10px}
.stat{background:#0f3460;border-radius:8px;padding:8px 14px;text-align:center}
.stat .num{font-size:1.4rem;font-weight:700;color:#e94560}
.stat .label{font-size:.65rem;color:#a0a0b0;text-transform:uppercase;letter-spacing:.5px}
.search-box{width:100%;padding:8px 12px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#e0e0e0;font-size:14px;outline:none}
.search-box:focus{border-color:#e94560}
.container{padding:8px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
thead{position:sticky;top:105px;z-index:5}
th{background:#0f3460;color:#e94560;padding:8px 5px;text-align:right;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid #e94560;font-size:11px}
th:first-child{text-align:left}
th:hover{background:#162d50}
th .arrow{font-size:9px;margin-left:1px;opacity:.5}
th.active .arrow{opacity:1}
td{padding:7px 5px;text-align:right;border-bottom:1px solid #1e2a4a}
td:first-child{text-align:left;font-weight:600;color:#53c0f0}
tr:hover{background:#1e2a4a}
.green{color:#4caf50}
.red{color:#ef5350}
.zero{color:#444}
a{color:#53c0f0;text-decoration:none}
a:hover{color:#e94560;text-decoration:underline}
.report-link{font-size:12px}
.footer{text-align:center;padding:16px;color:#555;font-size:11px}
@media(max-width:480px){
  .stat .num{font-size:1.1rem}
  .stat{padding:6px 10px}
  table{font-size:11px}
  th,td{padding:5px 3px}
  th{font-size:10px}
}
</style>
</head>
<body>

<div class="header">
  <h1>Trading Rules Overview</h1>
  <div class="stats">
    <div class="stat"><div class="num" id="totalRules">1,198</div><div class="label">Total Rules</div></div>
    <div class="stat"><div class="num" id="totalTickers">21</div><div class="label">Tickers</div></div>
    <div class="stat"><div class="num" id="totalPnl">32,501%</div><div class="label">Combined PnL</div></div>
  </div>
  <input type="text" class="search-box" id="search" placeholder="Filter tickers..." autocomplete="off">
</div>

<div class="container">
<table id="rulesTable">
<thead>
<tr>
  <th data-col="ticker" data-type="str">Ticker <span class="arrow">&#9650;</span></th>
  <th data-col="stock" data-type="num">Stock<br>Trader <span class="arrow">&#9650;</span></th>
  <th data-col="indiv" data-type="num">Indiv<br>Trader <span class="arrow">&#9650;</span></th>
  <th data-col="wr100" data-type="num">100%<br>WR <span class="arrow">&#9650;</span></th>
  <th data-col="pnl10" data-type="num">&gt;10%<br>PnL <span class="arrow">&#9650;</span></th>
  <th data-col="totalPnl" data-type="num" class="active">Total<br>PnL% <span class="arrow">&#9660;</span></th>
  <th data-col="ptpnl" data-type="num">Per Trade<br>PnL% <span class="arrow">&#9650;</span></th>
  <th data-col="report" data-type="str">Report <span class="arrow">&#9650;</span></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer">Last updated: 2026-04-10</div>

<script>
var data = [
  {ticker:"AMZN",  stock:37,  indiv:37,  wr100:26, pnl10:29, totalPnl:429.2,  ptpnl:2.54, report:"AMZN_backtest_summary_20260409.html"},
  {ticker:"ASTS",  stock:47,  indiv:47,  wr100:19, pnl10:36, totalPnl:992.2,  ptpnl:4.05, report:"ASTS_backtest_summary_20260409.html"},
  {ticker:"BWET",  stock:23,  indiv:23,  wr100:2,  pnl10:23, totalPnl:602.9,  ptpnl:5.99, report:"BWET_backtest_summary_20260409.html"},
  {ticker:"CI",    stock:73,  indiv:73,  wr100:5,  pnl10:72, totalPnl:1949.8, ptpnl:1.92, report:"CI_backtest_summary_20260409.html"},
  {ticker:"CLSK",  stock:61,  indiv:61,  wr100:32, pnl10:48, totalPnl:1191.3, ptpnl:3.96, report:"CLSK_backtest_summary_20260409.html"},
  {ticker:"CNBS",  stock:17,  indiv:17,  wr100:17, pnl10:7,  totalPnl:126.0,  ptpnl:2.47, report:"CNBS_backtest_summary_20260409.html"},
  {ticker:"CRWG",  stock:88,  indiv:88,  wr100:5,  pnl10:84, totalPnl:2629.1, ptpnl:5.49, report:"CRWG_backtest_summary_20260409.html"},
  {ticker:"DAL",   stock:145, indiv:145, wr100:6,  pnl10:141,totalPnl:6198.9, ptpnl:1.85, report:"DAL_backtest_summary_20260409.html"},
  {ticker:"DLTR",  stock:9,   indiv:9,   wr100:6,  pnl10:4,  totalPnl:62.1,   ptpnl:1.37, report:"DLTR_backtest_summary_20260409.html"},
  {ticker:"ELV",   stock:129, indiv:129, wr100:23, pnl10:116,totalPnl:3165.3, ptpnl:1.60, report:"ELV_backtest_summary_20260408.html"},
  {ticker:"F",     stock:5,   indiv:5,   wr100:4,  pnl10:1,  totalPnl:34.9,   ptpnl:1.96, report:"F_backtest_summary_20260409.html"},
  {ticker:"HUM",   stock:82,  indiv:82,  wr100:21, pnl10:68, totalPnl:1950.7, ptpnl:3.11, report:"HUM_backtest_summary_20260409.html"},
  {ticker:"LNG",   stock:40,  indiv:40,  wr100:16, pnl10:36, totalPnl:757.9,  ptpnl:5.43, report:"LNG_backtest_summary_20260409.html"},
  {ticker:"NKE",   stock:6,   indiv:6,   wr100:6,  pnl10:0,  totalPnl:35.3,   ptpnl:1.76, report:"NKE_backtest_summary_20260409.html"},
  {ticker:"SMCI",  stock:178, indiv:178, wr100:3,  pnl10:176,totalPnl:8752.2, ptpnl:2.17, report:"SMCI_backtest_summary_20260409.html"},
  {ticker:"TSAT",  stock:59,  indiv:59,  wr100:29, pnl10:56, totalPnl:1589.2, ptpnl:5.66, report:"TSAT_backtest_summary_20260409.html"},
  {ticker:"UNH",   stock:74,  indiv:74,  wr100:5,  pnl10:71, totalPnl:1746.8, ptpnl:1.35, report:"UNH_backtest_summary_20260408.html"},
  {ticker:"USAR",  stock:72,  indiv:72,  wr100:23, pnl10:53, totalPnl:1287.1, ptpnl:3.90, report:"USAR_backtest_summary_20260409.html"},
  {ticker:"PFE",   stock:122, indiv:122, wr100:0,  pnl10:0,  totalPnl:0.0,    ptpnl:0.0,  report:"PFE_backtest_summary_20260409.html"},
  {ticker:"BKR",   stock:4,   indiv:4,   wr100:0,  pnl10:0,  totalPnl:0.0,    ptpnl:0.0,  report:"BKR_backtest_summary_20260408_153014.html"},
  {ticker:"HAL",   stock:4,   indiv:4,   wr100:0,  pnl10:0,  totalPnl:0.0,    ptpnl:0.0,  report:"HAL_backtest_summary_20260408_153014.html"}
];

var sortCol = "totalPnl", sortAsc = false;

function render(filter) {
  var f = (filter || "").toLowerCase();
  var rows = data.filter(function(d){ return !f || d.ticker.toLowerCase().indexOf(f) >= 0; });
  rows.sort(function(a,b){
    var va = sortCol === "ticker" ? a.ticker : a[sortCol];
    var vb = sortCol === "ticker" ? b.ticker : b[sortCol];
    if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
  var html = "";
  rows.forEach(function(d){
    html += "<tr>";
    html += "<td><a href='reports/" + d.report + "'>" + d.ticker + "</a></td>";
    html += "<td>" + d.stock + "</td>";
    html += "<td>" + d.indiv + "</td>";
    html += "<td>" + (d.wr100 ? '<span class="green">' + d.wr100 + '</span>' : '<span class="zero">0</span>') + "</td>";
    html += "<td>" + (d.pnl10 ? '<span class="green">' + d.pnl10 + '</span>' : '<span class="zero">0</span>') + "</td>";
    html += "<td><strong>" + (d.totalPnl > 0 ? d.totalPnl.toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:1}) + "%" : '<span class="zero">0</span>') + "</strong></td>";
    html += "<td>" + (d.ptpnl > 0 ? d.ptpnl.toFixed(2) + "%" : '<span class="zero">0</span>') + "</td>";
    html += '<td class="report-link"><a href="reports/' + d.report + '">View</a></td>';
    html += "</tr>";
  });
  document.getElementById("tbody").innerHTML = html;
}

document.getElementById("search").addEventListener("input", function(){ render(this.value); });

document.querySelectorAll("th[data-col]").forEach(function(th){
  th.addEventListener("click", function(){
    var col = this.getAttribute("data-col");
    if (col === "report") return;
    if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = col === "ticker"; }
    document.querySelectorAll("th").forEach(function(h){ h.classList.remove("active"); h.querySelector(".arrow").textContent = "\u25B2"; });
    this.classList.add("active");
    this.querySelector(".arrow").textContent = sortAsc ? "\u25B2" : "\u25BC";
    render(document.getElementById("search").value);
  });
});

render();
</script>
</body>
</html>
