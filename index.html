<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Rules Overview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
.header{background:#16213e;padding:12px 16px;border-bottom:1px solid #0f3460}
.header h1{font-size:1.3rem;color:#e94560;margin-bottom:4px}
.search-box{width:100%;padding:8px 12px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#e0e0e0;font-size:14px;outline:none}
.search-box:focus{border-color:#e94560}
.container{padding:8px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
th{background:#0f3460;color:#e94560;padding:8px 5px;text-align:right;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid #e94560;font-size:11px}
th:first-child{text-align:left}
th:hover{background:#162d50}
th .arrow{font-size:9px;margin-left:1px;opacity:.5}
th.active .arrow{opacity:1}
td{padding:7px 5px;text-align:right;border-bottom:1px solid #1e2a4a}
td:first-child{text-align:left;font-weight:600;color:#53c0f0}
tr:hover{background:#1e2a4a}
.green{color:#4caf50}
.red{color:#ef5350}
.zero{color:#444}
a{color:#53c0f0;text-decoration:none}
a:hover{color:#e94560;text-decoration:underline}
.report-link{font-size:12px}
.footer{text-align:center;padding:16px;color:#555;font-size:11px}
@media(max-width:480px){table{font-size:11px}th,td{padding:5px 3px}th{font-size:10px}}
</style>
</head>
<body>
<div class="header">
  <h1>Trading Rules Overview</h1>
  <p style="color:#a0a0b0;font-size:12px;margin:4px 0 8px">24 tickers &#8226; 6,546 rules &#8226; 30.1%% avg PnL</p>
  <input type="text" class="search-box" id="search" placeholder="Filter tickers..." autocomplete="off">
</div>
<div class="container">
<table id="rulesTable">
<thead>
<tr>
  <th data-col="ticker" data-type="str">Ticker <span class="arrow">&#9650;</span></th>
  <th data-col="total" data-type="num">Rules <span class="arrow">&#9650;</span></th>
  <th data-col="stock" data-type="num">Stock <span class="arrow">&#9650;</span></th>
  <th data-col="indiv" data-type="num">Indiv <span class="arrow">&#9650;</span></th>
  <th data-col="wr100" data-type="num">100%WR <span class="arrow">&#9650;</span></th>
  <th data-col="pnl10" data-type="num">&gt;10%PnL <span class="arrow">&#9650;</span></th>
  <th data-col="avgPnl" data-type="num" class="active">Avg PnL% <span class="arrow">&#9660;</span></th>
  <th data-col="ptpnl" data-type="num">PTPnL% <span class="arrow">&#9650;</span></th>
  <th data-col="report" data-type="str">Report <span class="arrow">&#9650;</span></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
<div class="footer">Last updated: 2026-04-10</div>
<script>
var data = [
  {ticker:"BWET",total:69,stock:69,indiv:69,wr100:8,pnl10:68,avgPnl:55.12,ptpnl:5.68,report:"BWET_backtest_summary.html"},
  {ticker:"ASTS",total:308,stock:307,indiv:307,wr100:50,pnl10:292,avgPnl:44.24,ptpnl:3.44,report:"ASTS_backtest_summary.html"},

  {ticker:"TSAT",total:320,stock:319,indiv:319,wr100:80,pnl10:308,avgPnl:38.84,ptpnl:4.33,report:"TSAT_backtest_summary.html"},
  {ticker:"HAL",total:375,stock:374,indiv:374,wr100:66,pnl10:368,avgPnl:36.71,ptpnl:0.0,report:"HAL_backtest_summary.html"},
  {ticker:"CLSK",total:268,stock:265,indiv:265,wr100:80,pnl10:234,avgPnl:34.25,ptpnl:3.04,report:"CLSK_backtest_summary.html"},
  {ticker:"DAL",total:386,stock:383,indiv:383,wr100:23,pnl10:370,avgPnl:34.16,ptpnl:2.19,report:"DAL_backtest_summary.html"},
  {ticker:"BKR",total:341,stock:341,indiv:341,wr100:48,pnl10:327,avgPnl:33.36,ptpnl:0.0,report:"BKR_backtest_summary.html"},
  {ticker:"SLB",total:304,stock:302,indiv:302,wr100:46,pnl10:301,avgPnl:33.2,ptpnl:0.0,report:"SLB_backtest_summary.html"},
  {ticker:"CNBS",total:181,stock:174,indiv:174,wr100:44,pnl10:152,avgPnl:32.28,ptpnl:3.32,report:"CNBS_backtest_summary.html"},
  {ticker:"USAR",total:260,stock:255,indiv:255,wr100:58,pnl10:226,avgPnl:27.7,ptpnl:3.68,report:"USAR_backtest_summary.html"},
  {ticker:"CRWG",total:217,stock:208,indiv:208,wr100:33,pnl10:194,avgPnl:25.35,ptpnl:4.4,report:"CRWG_backtest_summary.html"},
  {ticker:"DLTR",total:149,stock:147,indiv:147,wr100:38,pnl10:127,avgPnl:24.67,ptpnl:2.69,report:"DLTR_backtest_summary.html"},
  {ticker:"HUM",total:404,stock:394,indiv:394,wr100:99,pnl10:344,avgPnl:23.73,ptpnl:2.95,report:"HUM_backtest_summary.html"},
  {ticker:"CI",total:329,stock:329,indiv:329,wr100:101,pnl10:303,avgPnl:23.56,ptpnl:3.49,report:"CI_backtest_summary.html"},
  {ticker:"UNH",total:228,stock:225,indiv:225,wr100:27,pnl10:204,avgPnl:21.66,ptpnl:1.58,report:"UNH_backtest_summary.html"},
  {ticker:"ELV",total:463,stock:461,indiv:461,wr100:135,pnl10:391,avgPnl:21.4,ptpnl:2.22,report:"ELV_backtest_summary.html"},
  {ticker:"ITA",total:234,stock:234,indiv:234,wr100:55,pnl10:203,avgPnl:21.11,ptpnl:2.6,report:"ITA_backtest_summary.html"},

  {ticker:"F",total:114,stock:111,indiv:111,wr100:34,pnl10:98,avgPnl:19.28,ptpnl:3.35,report:"F_backtest_summary.html"},
  {ticker:"AMZN",total:202,stock:199,indiv:199,wr100:79,pnl10:159,avgPnl:16.57,ptpnl:2.39,report:"AMZN_backtest_summary.html"},
  {ticker:"NKE",total:189,stock:184,indiv:184,wr100:69,pnl10:137,avgPnl:15.66,ptpnl:2.11,report:"NKE_backtest_summary.html"},
  {ticker:"MKC",total:228,stock:228,indiv:228,wr100:76,pnl10:182,avgPnl:14.82,ptpnl:1.88,report:"MKC_backtest_summary.html"}
];
var sortCol="avgPnl",sortAsc=false;
function render(filter){
  var f=(filter||"").toLowerCase();
  var rows=data.filter(function(d){return !f||d.ticker.toLowerCase().indexOf(f)>=0;});
  rows.sort(function(a,b){
    var va=sortCol==="ticker"?a.ticker:a[sortCol];
    var vb=sortCol==="ticker"?b.ticker:b[sortCol];
    if(typeof va==="string")return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });
  var html="";
  rows.forEach(function(d){
    html+="<tr>";
    html+="<td><a href='reports/"+d.report+"'>"+d.ticker+"</a></td>";
    html+="<td>"+d.total+"</td>";
    html+="<td>"+(d.stock?'<span class="green">'+d.stock+'</span>':'<span class="zero">0</span>')+"</td>";
    html+="<td>"+(d.indiv?'<span class="green">'+d.indiv+'</span>':'<span class="zero">0</span>')+"</td>";
    html+="<td>"+(d.wr100?'<span class="green">'+d.wr100+'</span>':'<span class="zero">0</span>')+"</td>";
    html+="<td>"+(d.pnl10?'<span class="green">'+d.pnl10+'</span>':'<span class="zero">0</span>')+"</td>";
    html+="<td><strong>"+(d.avgPnl>0?d.avgPnl.toFixed(1)+"%":'<span class="zero">0</span>')+"</strong></td>";
    html+="<td>"+(d.ptpnl>0?d.ptpnl.toFixed(2)+"%":'<span class="zero">0</span>')+"</td>";
    html+='<td class="report-link"><a href="reports/'+d.report+'">View</a></td>';
    html+="</tr>";
  });
  document.getElementById("tbody").innerHTML=html;
}
document.getElementById("search").addEventListener("input",function(){render(this.value);});
document.querySelectorAll("th[data-col]").forEach(function(th){
  th.addEventListener("click",function(){
    var col=this.getAttribute("data-col");
    if(col==="report")return;
    if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=col==="ticker";}
    document.querySelectorAll("th").forEach(function(h){h.classList.remove("active");h.querySelector(".arrow").innerHTML="&#9650;";});
    this.classList.add("active");
    this.querySelector(".arrow").innerHTML=sortAsc?"&#9650;":"&#9660;";
    render(document.getElementById("search").value);
  });
});
render();
</script>
</body>
</html>
