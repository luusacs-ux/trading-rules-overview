var sortCol="v",sortAsc=false,searchVal="",sectorVal="",dataVal="";
var sectors=new Set();
data.forEach(function(r){if(r.s)sectors.add(r.s)});
var sel=document.getElementById("sectorFilter");
Array.from(sectors).sort().forEach(function(s){var o=document.createElement("option");o.value=s;o.textContent=s;sel.appendChild(o)});

function fmt(n){if(n>=1e12)return(n/1e12).toFixed(1)+"T";if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toString()}

function render(){
  var filtered=data.filter(function(r){
    if(searchVal){
      var s=searchVal.toLowerCase();
      if(r.t.toLowerCase().indexOf(s)<0&&r.n.toLowerCase().indexOf(s)<0&&r.s.toLowerCase().indexOf(s)<0&&r.i.toLowerCase().indexOf(s)<0)return false;
    }
    if(sectorVal&&r.s!==sectorVal)return false;
    if(dataVal==="has1m"&&!r.d1m)return false;
    if(dataVal==="no1m"&&r.d1m)return false;
    if(dataVal==="hasRules"&&r.rules===0)return false;
    if(dataVal==="noRules"&&r.rules>0)return false;
    if(dataVal==="ready"&&(!r.d1m||r.rules>0))return false;
    if(dataVal==="hasBear"&&r.br===0)return false;
    if(dataVal==="noBear"&&r.br>0)return false;
    return true;
  });
  filtered.sort(function(a,b){
    var va=a[sortCol],vb=b[sortCol];
    if(typeof va==="string"){va=va.toLowerCase();vb=vb.toLowerCase()}
    if(va<vb)return sortAsc?-1:1;
    if(va>vb)return sortAsc?1:-1;
    return 0;
  });
  var sb=document.getElementById("statsBar");
  var fWith1m=filtered.filter(function(r){return r.d1m}).length;
  var fWithRules=filtered.filter(function(r){return r.rules>0}).length;
  var fWithBear=filtered.filter(function(r){return r.br>0}).length;
  var fReady=filtered.filter(function(r){return r.d1m&&r.rules===0}).length;
  sb.innerHTML='<span class="stat">Showing: <b>'+filtered.length+'</b></span>'
    +'<span class="stat">With 1m: <b>'+fWith1m+'</b></span>'
    +'<span class="stat">With Rules: <b>'+fWithRules+'</b></span>'
    +'<span class="stat">Bear Rules: <b>'+fWithBear+'</b></span>'
    +'<span class="stat">Pipeline Ready: <b>'+fReady+'</b></span>';
  var html="";
  filtered.forEach(function(r){
    var d1=r.d1m?'<span class="badge badge-yes">YES</span>':'<span class="badge badge-no">NO</span>';
    var d5=r.d5m?'<span class="badge badge-yes">YES</span>':'<span class="badge badge-no">NO</span>';
    var rb=r.rules>0?'<span class="badge badge-rules">'+r.rules+'</span>':'<span class="dim">0</span>';
    var bb=r.br>0?'<span class="badge" style="background:#6b2020;color:#ff9999">'+r.br+'</span>':'<span class="dim">0</span>';
    html+="<tr><td>"+r.t+"</td><td>"+r.n+"</td><td>"+r.s+"</td><td>"+r.i+"</td>"
      +"<td>"+fmt(r.v)+"</td><td>"+fmt(r.mc)+"</td><td>"+r.qt+"</td>"
      +"<td>"+d1+"</td><td>"+d5+"</td><td>"+rb+"</td><td>"+bb+"</td></tr>";
  });
  document.getElementById("tbody").innerHTML=html;
}

document.querySelectorAll("th").forEach(function(th){
  th.addEventListener("click",function(){
    var col=this.dataset.col;
    if(sortCol===col)sortAsc=!sortAsc;
    else{sortCol=col;sortAsc=this.dataset.type==="str"}
    document.querySelectorAll("th").forEach(function(h){h.classList.remove("active");h.querySelector(".arrow").innerHTML="&#9650;"});
    this.classList.add("active");
    this.querySelector(".arrow").innerHTML=sortAsc?"&#9650;":"&#9660;";
    render();
  });
});
document.getElementById("search").addEventListener("input",function(){searchVal=this.value;render()});
document.getElementById("sectorFilter").addEventListener("change",function(){sectorVal=this.value;render()});
document.getElementById("dataFilter").addEventListener("change",function(){dataVal=this.value;render()});
render();
</script>
