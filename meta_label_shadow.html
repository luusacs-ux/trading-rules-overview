<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Meta-Label Shadow Forward Test</title>
<style>
:root{--bg:#0f1419;--card:#1a2230;--ink:#e6edf3;--mut:#8b98a9;--line:#2a3444}
@media(prefers-color-scheme:light){:root{--bg:#f5f7fa;--card:#fff;--ink:#1a2230;--mut:#5a6673;--line:#e2e8f0}}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,Segoe UI,sans-serif;padding:24px}
h1{font-size:22px;margin:0 0 4px}.sub{color:var(--mut);margin-bottom:18px}
.grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.c{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;min-width:150px}
.c .v{font-size:22px;font-weight:700}.c .l{color:var(--mut);font-size:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:14px}
.verdict{padding:12px 16px;border-radius:10px;font-weight:600;margin-bottom:14px}
.verdict.good{background:#12331f;color:#5fd88a;border:1px solid #1f5c37}
.verdict.warn{background:#33301a;color:#e0c060;border:1px solid #5c542a}
a.back{color:#4a9eff;text-decoration:none;font-size:13px}
</style></head><body>
